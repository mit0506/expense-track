{% extends "base.html" %}

{% block title %}Profile - Expense Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Profile Settings</h1>
    
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="avatar" class="form-label">Avatar</label>
            <input type="file" id="avatar" name="avatar" accept="image/*" class="form-input">
            {% if profile.avatar %}
            <div style="margin-top: var(--spacing-lg);">
                <img src="{{ url_for('static', filename='avatars/' + profile.avatar) }}" alt="Current avatar" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--color-primary-600); object-fit: cover;">
            </div>
            {% endif %}
        </div>

        <div class="form-group">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" name="name" value="{{ profile.name }}" required class="form-input">
        </div>

        <div class="form-group">
            <label for="monthly_income" class="form-label">Monthly Income</label>
            <input type="number" step="0.01" id="monthly_income" name="monthly_income" value="{{ profile.monthly_income }}" required class="form-input">
            <span class="form-hint">Enter your gross monthly income in rupees</span>
        </div>

        <div class="form-group">
            <label for="monthly_target" class="form-label">Monthly Spending Target</label>
            <input type="number" step="0.01" id="monthly_target" name="monthly_target" value="{{ profile.monthly_target }}" required class="form-input">
            <span class="form-hint">Set a spending limit to receive alerts when exceeded</span>
        </div>

        <div class="form-helper">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
