{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block header_title %}Error_500{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-20 gap-6">
    <div class="w-20 h-20 rounded-full machined-plate flex items-center justify-center border border-white/10">
        <span class="material-symbols-outlined text-primary text-4xl led-active">error</span>
    </div>
    <div class="text-center">
        <h2 class="font-mono text-4xl font-bold text-text-main mb-2">500</h2>
        <p class="font-mono text-[11px] text-text-muted uppercase tracking-widest">Internal_System_Error</p>
        <p class="text-sm text-text-muted mt-4">Something went wrong on our end. Please try again.</p>
    </div>
    <a href="{{ url_for('main.index') }}" class="machined-button px-6 py-3 bg-primary text-text-main text-[10px] font-mono font-bold uppercase tracking-widest">
        Return to Dashboard
    </a>
</div>
{% endblock %}
